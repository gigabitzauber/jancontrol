name: release-workflow
run-name: Release run ${{ github.run_number }}
on:
  workflow_dispatch:
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: '25'
          check-latest: true
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean verify -Prelease
        env:
          SIGN_KEY: ${{ secrets.GIGABITZAUBER_GPG_PRIVATE_KEY }}
          SIGN_KEY_PASS: ${{ secrets.GIGABITZAUBER_GPG_PRIVATE_KEY_PASSPHRASE }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GIGABITZAUBER_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GIGABITZAUBER_GPG_PRIVATE_KEY_PASSPHRASE }}

      - name: Create signed hash file
        id: create_hash_file
        run: |
          HASH_FILE_NAME="jancontrol-hashes.sha256"
          echo "hash_file_name=$HASH_FILE_NAME" >> $GITHUB_OUTPUT
          cd target
          sha256sum *.jar *.asc > "${HASH_FILE_NAME}"
          gpg --batch --detach-sign --armor \
              --local-user "${SIGN_KEY_ID}" \
              --passphrase-fd 0 \
              "${HASH_FILE_NAME}" <<< "${SIGN_KEY_PASS}"
        env:
          SIGN_KEY_ID: ${{ secrets.GIGABITZAUBER_GPG_PRIVATE_KEY_ID }}
          SIGN_KEY_PASS: ${{ secrets.GIGABITZAUBER_GPG_PRIVATE_KEY_PASSPHRASE }}

      - name: Calculate version
        id: version
        run: |
          VERSION=$(sh scripts/get_latest_release_version.sh)
          echo "Project version is: ${VERSION}"
          echo "jc_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        id: release_notes
        run: |
          JC_VERSION=${{ steps.version.outputs.jc_version }}
          JC_NAME="jancontrol"
          echo "jc_name=$JC_NAME" >> $GITHUB_OUTPUT
          JC_HASH_FILE_NAME=${{ steps.create_hash_file.outputs.hash_file_name }}
          echo "### Jancontrol ${JC_VERSION} Release Notes" > release_notes.md
          echo "" >> release_notes.md
          echo "Report bugs to [github.com/gigabitzauber/jancontrol/issues](https://github.com/gigabitzauber/jancontrol/issues)." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Artifacts" >> release_notes.md
          echo "- \`${JC_NAME}-${JC_VERSION}.jar\` - Executable JAR" >> release_notes.md
          echo "- \`${JC_NAME}-${JC_VERSION}.jar.asc\` - Executable JAR's GPG signature" >> release_notes.md
          echo "- \`${JC_NAME}-${JC_VERSION}-sources.jar\` - Source code" >> release_notes.md
          echo "- \`${JC_NAME}-${JC_VERSION}-sources.jar.asc\` - Source code's GPG signature" >> release_notes.md
          echo "- \`${JC_HASH_FILE_NAME}\` - SHA 256 hashes for all artifacts" >> release_notes.md
          echo "- \`${JC_HASH_FILE_NAME}.asc\` - Hash file's GPG signature" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Verification" >> release_notes.md
          echo "All artifacts are signed with GPG. To verify:" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "gpg --verify <artifact>.asc" >> release_notes.md
          echo "sha256sum -c ${JC_HASH_FILE_NAME}" >> release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.JANCONTROL_RELEASE_TOKEN }}
          files: |
            target/${{ steps.release_notes.outputs.jc_name }}-*.jar
            target/${{ steps.release_notes.outputs.jc_name }}-*.jar.asc
            target/${{ steps.release_notes.outputs.jc_name }}-*.sha256
            target/${{ steps.release_notes.outputs.jc_name }}-*.sha256.asc
          body_path: release_notes.md
          draft: false
          prerelease: false
          make_latest: true
          tag_name: v${{ steps.version.outputs.jc_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Summary
        run: |
          echo "✅ Release created successfully!"
